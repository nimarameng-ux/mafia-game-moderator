<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#4a0f1c"><link rel="manifest" href="manifest.json"><link rel="icon" href="icon.svg"><title>Mafia Game Moderator</title><style>:root{--panel:rgba(10,5,7,.91);--line:rgba(212,175,55,.34);--txt:#fff7e6;--mut:#dfcfa3;--gold:#d4af37;--gold2:#f6df8c;--green:#22c55e}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:linear-gradient(rgba(5,2,4,.58),rgba(5,2,4,.84)),url('background.svg') center/cover fixed no-repeat,#070304}button,input,select,textarea{font:inherit}button{border:1px solid rgba(212,175,55,.36);border-radius:15px;padding:13px 15px;background:linear-gradient(180deg,var(--gold2),var(--gold));color:#1d1102;font-weight:950;box-shadow:0 10px 25px #0008}button.secondary{background:rgba(212,175,55,.13);color:var(--gold2)}button.danger{background:linear-gradient(180deg,#a32945,#6e1028);color:#fff}button.good{background:linear-gradient(180deg,#39dc7b,#16a34a);color:#031b0b}button:disabled{opacity:.42;filter:grayscale(1)}input,select,textarea{width:100%;border:1px solid #d7c27a;border-radius:14px;padding:12px;background:#fffaf0;color:#16080b}textarea{min-height:120px}label{font-weight:900;color:#f4ddb0;display:block;margin:0 0 6px}.wrap{max-width:1120px;margin:auto;padding:14px}.top{display:flex;justify-content:space-between;gap:10px;margin:8px 0 14px}.brand h1{font-size:clamp(30px,7vw,52px);line-height:1;margin:0}.hint,.small{color:var(--mut);line-height:1.45}.small{font-size:13px}.credit{font-size:11px;opacity:.75;color:#ead99b}.card{background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:16px;margin:14px 0;box-shadow:0 24px 60px #0009;backdrop-filter:blur(8px)}.dash{position:sticky;top:0;z-index:10;background:rgba(5,2,4,.97);border:1px solid var(--line);border-radius:22px;padding:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.dash div{text-align:center;background:rgba(212,175,55,.08);border-radius:14px;padding:9px}.dash b{font-size:23px;display:block}.dash span{font-size:11px;color:var(--mut);font-weight:900}.players{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.row{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:17px;padding:12px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}.row.dead{opacity:.45;filter:grayscale(1)}.row.done{border-color:var(--green);background:rgba(34,197,94,.12)}.name{font-weight:950}.pill{display:inline-flex;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:950;background:rgba(212,175,55,.14);border:1px solid var(--line);color:var(--gold2)}.ok{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.35);border-radius:15px;padding:11px;color:#dcfce7}.warn{background:rgba(212,175,55,.12);border:1px solid rgba(212,175,55,.35);border-radius:15px;padding:11px;color:#fff2bf}.err{background:rgba(220,38,38,.14);border:1px solid rgba(220,38,38,.38);border-radius:15px;padding:11px;color:#fecaca}.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:12px}.actions button{flex:1;min-width:140px}.log{display:grid;gap:8px;max-height:360px;overflow:auto}.log div{background:rgba(255,255,255,.055);border:1px solid var(--line);border-radius:13px;padding:10px}.modal{position:fixed;inset:0;background:#050204;display:none;align-items:center;justify-content:center;z-index:30;padding:18px}.modal.on{display:flex}.box{width:min(560px,100%);background:linear-gradient(180deg,#2b0e16,#070304);border:1px solid var(--line);border-radius:28px;padding:24px;text-align:center;display:flex;flex-direction:column;gap:16px}.role{font-size:clamp(40px,13vw,70px);font-weight:1000;color:var(--gold2);margin:0}.pass{font-size:clamp(28px,8vw,48px);font-weight:1000;margin:0}@media(max-width:760px){.top{display:block}.players{grid-template-columns:1fr}.dash{grid-template-columns:repeat(2,1fr)}.row{grid-template-columns:1fr}.actions button{min-width:0;width:100%}}</style></head><body><div class="wrap"><div class="top"><div class="brand"><h1>Mafia Game Moderator</h1><p class="hint">Step-by-step handler guide with autosave, live dashboard and full game log.</p><span class="credit">by Nima · Rev 14 Stabilised</span></div><div class="actions"><button class="secondary" onclick="health()">Health Check</button><button class="danger" onclick="menu()">Menu</button></div></div><div id="dash" class="dash"></div><main id="app"></main></div><div id="modal" class="modal"><div class="box"><div id="passView"><p class="small">PASS THE PHONE TO</p><h2 id="passName" class="pass"></h2><button class="good" onclick="showRole()">Reveal My Role</button></div><div id="roleView" style="display:none"><p class="small">PRIVATE ROLE</p><h2 id="mName"></h2><p id="mRole" class="role"></p><p id="mTeam" class="pill"></p><p id="mDesc" class="hint"></p><button class="danger" onclick="hideRoleAndAdvance()">Hide Role & Continue</button></div></div></div><script>const SAVE='nima_mafia_rev14',OLD='nima_mafia_rev13';const R={Godfather:{n:'Godfather',t:'Mafia',d:'Lead the Mafia team. Detective reads you as Citizen.'},Lecter:{n:'Dr. Lecter',t:'Mafia',d:'Shield one Mafia-side player each night.'},Mafia:{n:'Mafia',t:'Mafia',d:'Work with the Mafia team.'},Detective:{n:'Detective',t:'Citizen',d:'Check one active player each night.'},Doctor:{n:'Citizen Doctor',t:'Citizen',d:'Save one active player each night.'},Vigilante:{n:'Vigilante',t:'Citizen',d:'Use a limited night action.'},Citizen:{n:'Citizen',t:'Citizen',d:'Talk and vote during the day.'}};const $=x=>document.getElementById(x),fresh=()=>({phase:'setup',setupStep:0,day:1,night:1,step:'setup',settings:{start:'',count:8,mafia:2,actions:2,selfSaves:1,gfImmune:true},names:[],players:[],seen:[],revealIndex:0,talked:[],nightData:{stage:0},counters:{self:0,actions:0},lastPublic:'Game has not started yet.',logs:[],finished:false,winner:'',reason:'',lastSaved:''});let S=fresh(),active=null;function save(){S.lastSaved=new Date().toISOString();localStorage.setItem(SAVE,JSON.stringify(S))}function load(){try{let x=localStorage.getItem(SAVE);if(x){S=Object.assign(fresh(),JSON.parse(x));return}let o=localStorage.getItem(OLD);if(o){S=Object.assign(fresh(),JSON.parse(o));S.revealIndex=Math.max(0,S.players.findIndex(p=>!S.seen.includes(p.id)));if(S.revealIndex<0)S.revealIndex=S.players.length;save()}}catch(e){S=fresh()}}function esc(x){return String(x??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function uid(){return Math.random().toString(36).slice(2,10)}function live(){return S.players.filter(p=>p.alive)}function team(p){return R[p.role].t}function ma(){return live().filter(p=>team(p)==='Mafia')}function ci(){return live().filter(p=>team(p)==='Citizen')}function dm(){return S.players.filter(p=>!p.alive&&team(p)==='Mafia')}function dc(){return S.players.filter(p=>!p.alive&&team(p)==='Citizen')}function byId(id){return S.players.find(p=>p.id===id)}function label(){return S.finished?'Completed':S.phase==='day'?'Day '+S.day:S.phase==='night'?'Night '+S.night:S.phase==='reveal'?'Role Reveal':'Setup'}function log(type,text){S.logs.unshift({phase:label(),type,text,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});save()}function dash(){let st=S.phase==='reveal'?'Player '+Math.min(S.revealIndex+1,S.players.length)+'/'+S.players.length:S.step;$('dash').innerHTML=`<div><span>Phase</span><b>${esc(label())}</b><span>${esc(st||'')}</span></div><div><span>Mafia</span><b>${ma().length}/${dm().length}</b><span>active/out</span></div><div><span>Citizens</span><b>${ci().length}/${dc().length}</b><span>active/out</span></div><div><span>Limits</span><b>${S.counters.actions}/${S.settings.actions}</b><span>Vig · Dr ${S.counters.self}/${S.settings.selfSaves}</span></div>`}function logCard(){return `<section class="card"><h2>Game Log</h2><div class="log">${S.logs.length?S.logs.map(l=>`<div><b>${esc(l.phase)} · ${esc(l.type)}</b><br>${esc(l.text)}<div class="small">${esc(l.time)}</div></div>`).join(''):'<div>No log yet.</div>'}</div></section>`}function layout(t,s,b){$('app').innerHTML=`<section class="card"><h2>${t}</h2><p class="hint">${s}</p>${b}</section>${logCard()}`;dash();save()}function render(){if(S.finished)return finishScreen();if(S.phase==='setup')return setup();if(S.phase==='reveal')return reveal();if(S.phase==='day')return day();if(S.phase==='night')return night()}function setup(){let i=S.setupStep;if(i===0)return layout('Setup 1/8 — Start Time','Confirm the game start time.',`<input id="v" type="time" value="${esc(S.settings.start)}"><div class="actions"><button class="good" onclick="S.settings.start=$('v').value||new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});nextSetup()">Confirm & Next</button></div>`);if(i===1)return layout('Setup 2/8 — Player Count','Enter total players.',`<input id="v" type="number" min="5" max="40" value="${S.settings.count}"><div class="actions"><button class="good" onclick="S.settings.count=Math.max(5,Math.min(40,+$('v').value||8));nextSetup()">Confirm & Next</button></div>`);if(i===2)return layout('Setup 3/8 — Mafia Count','Includes all Mafia-side roles.',`<input id="v" type="number" min="1" value="${S.settings.mafia}"><div class="actions"><button class="good" onclick="S.settings.mafia=Math.max(1,Math.min(Math.floor((S.settings.count-1)/2),+$('v').value||1));nextSetup()">Confirm & Next</button></div>`);if(i===3)return layout('Setup 4/8 — Vigilante Limit','Set total allowed actions.',`<input id="v" type="number" min="0" value="${S.settings.actions}"><div class="actions"><button class="good" onclick="S.settings.actions=Math.max(0,+$('v').value||0);nextSetup()">Confirm & Next</button></div>`);if(i===4)return layout('Setup 5/8 — Doctor Self-Saves','Set the self-save limit.',`<input id="v" type="number" min="0" value="${S.settings.selfSaves}"><div class="actions"><button class="good" onclick="S.settings.selfSaves=Math.max(0,+$('v').value||0);nextSetup()">Confirm & Next</button></div>`);if(i===5)return layout('Setup 6/8 — Godfather Immunity','Choose the rule.',`<div class="actions"><button class="good" onclick="S.settings.gfImmune=true;nextSetup()">ON</button><button class="secondary" onclick="S.settings.gfImmune=false;nextSetup()">OFF</button></div>`);if(i===6)return layout('Setup 7/8 — Player Names','Enter exactly one name per player.',`<textarea id="v">${esc(S.names.join('\n'))}</textarea><div id="err" class="err" style="display:none"></div><div class="actions"><button class="good" onclick="names()">Confirm Names</button></div>`);return layout('Setup 8/8 — Shuffle & Assign','Start private reveal.',`<div class="warn">${esc(preview())}</div><div class="actions"><button class="good" onclick="shuffleRoles()">Shuffle Roles & Start Reveal</button></div>`)}function nextSetup(){S.setupStep=Math.min(7,S.setupStep+1);log('Setup','Step '+S.setupStep+' confirmed');setup()}function names(){let n=$('v').value.split(/\n/).map(x=>x.trim()).filter(Boolean);if(n.length!==S.settings.count){$('err').style.display='block';$('err').textContent='You entered '+n.length+' names. Required: '+S.settings.count;return}S.names=n;nextSetup()}function roles(){let n=S.settings.count,m=S.settings.mafia,a=['Godfather'];if(m>1&&n>=7)a.push('Lecter');while(a.filter(r=>R[r].t==='Mafia').length<m)a.push('Mafia');if(a.length<n)a.push('Detective');if(a.length<n)a.push('Doctor');if(a.length<n)a.push('Vigilante');while(a.length<n)a.push('Citizen');return a.slice(0,n)}function preview(){let c={};roles().forEach(r=>c[R[r].n]=(c[R[r].n]||0)+1);return Object.entries(c).map(([k,v])=>v+' '+k).join(' · ')}function shuf(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function shuffleRoles(){let ns=shuf(S.names),rs=shuf(roles());S.players=ns.map((name,i)=>({id:uid(),name,role:rs[i],alive:true}));S.seen=[];S.revealIndex=0;S.phase='reveal';S.step='Private role reveal';log('Shuffle','Roles assigned');save();reveal()}function reveal(){if(S.revealIndex>=S.players.length){S.phase='day';S.step='Conversation';S.day=1;S.talked=[];log('Transition','All roles seen. Day 1 started.');save();return day()}let p=S.players[S.revealIndex];layout('Private Role Reveal','Pass the phone to the named player. The app will advance after the role is hidden.',`<div class="ok"><b>${S.revealIndex+1} of ${S.players.length}</b><br>Next player: ${esc(p.name)}</div><div class="actions"><button class="good" onclick="openReveal('${p.id}')">Pass Phone to ${esc(p.name)}</button></div>`)}function openReveal(id){active=id;let p=byId(id);$('passName').textContent=p.name;$('passView').style.display='block';$('roleView').style.display='none';$('modal').classList.add('on')}function showRole(){let p=byId(active);$('mName').textContent=p.name;$('mRole').textContent=R[p.role].n;$('mTeam').textContent=R[p.role].t+' Team';$('mDesc').textContent=R[p.role].d;$('passView').style.display='none';$('roleView').style.display='block'}function hideRoleAndAdvance(){let p=byId(active);if(!p)return;$('modal').classList.remove('on');if(!S.seen.includes(p.id))S.seen.push(p.id);log('Role Seen',p.name+' confirmed role');S.revealIndex++;active=null;save();reveal()}function day(){if(checkWin())return;let unt=live().filter(p=>!S.talked.includes(p.id));if(unt.length)return layout('Day '+S.day+' — Conversation','Tick each active player after they have had an opportunity to talk.',`<div class="players">${live().map(p=>`<div class="row ${S.talked.includes(p.id)?'done':''}"><div class="name">${esc(p.name)}</div><button ${S.talked.includes(p.id)?'disabled':''} onclick="talk('${p.id}')">${S.talked.includes(p.id)?'✓ Done':'Mark Spoke'}</button></div>`).join('')}</div>`);layout('Day '+S.day+' — Complete','All active players have spoken.',`<div class="actions"><button class="good" onclick="startNight()">Move to Night ${S.day}</button></div>`)}function talk(id){if(!S.talked.includes(id))S.talked.push(id);log('Conversation',byId(id).name+' spoke');day()}function startNight(){S.phase='night';S.night=S.day;S.step='Night instructions';S.nightData={stage:0};log('Transition','Night '+S.night+' started');night()}function night(){if(checkWin())return;let s=S.nightData.stage||0;if(s===0)return layout('Night '+S.night+' — Everyone Sleeps','Ask everyone to close their eyes.',`<div class="actions"><button class="good" onclick="nightNext()">Confirmed</button></div>`);if(s===1)return layout('Night '+S.night+' — Mafia Selection','Record the Mafia team selection.',`<select id="pick">${ci().map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select><div class="actions"><button class="good" onclick="S.nightData.mafiaTarget=$('pick').value;nightNext()">Confirm</button></div>`);if(s===2)return layout('Night '+S.night+' — Citizen Doctor','Record one saved player.',`<select id="pick">${live().map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select><div class="actions"><button class="good" onclick="S.nightData.doctorSave=$('pick').value;nightNext()">Confirm</button></div>`);if(s===3)return layout('Night '+S.night+' — Vigilante','Record a selection or skip.',`<select id="pick"><option value="">Skip</option>${live().map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select><div class="actions"><button class="good" onclick="S.nightData.vigilanteTarget=$('pick').value;if($('pick').value)S.counters.actions++;nightNext()">Confirm</button></div>`);processNight()}function nightNext(){S.nightData.stage=(S.nightData.stage||0)+1;save();night()}function processNight(){let out=[];let n=S.nightData;if(n.mafiaTarget&&n.mafiaTarget!==n.doctorSave)out.push(n.mafiaTarget);if(n.vigilanteTarget&&!out.includes(n.vigilanteTarget)){let p=byId(n.vigilanteTarget);if(!(p.role==='Godfather'&&S.settings.gfImmune))out.push(n.vigilanteTarget)}out.forEach(id=>{let p=byId(id);if(p)p.alive=false});S.lastPublic=out.length?out.map(id=>byId(id).name).join(' and ')+' left the game overnight.':'No one left the game overnight.';log('Night Result',S.lastPublic);if(checkWin())return;S.phase='day';S.day=S.night+1;S.step='Conversation';S.talked=[];save();day()}function checkWin(){if(!S.players.length)return false;let m=ma().length,c=ci().length;if(m===0){S.finished=true;S.winner='Citizens';S.reason='All Mafia-side players are out.'}else if(m>=c){S.finished=true;S.winner='Mafia';S.reason='Active Mafia count is equal to or greater than active Citizen count.'}if(S.finished){log('Game Completed',S.winner+' win');finishScreen();return true}return false}function finishScreen(){layout('Game Completed',S.winner+' win. '+S.reason,`<div class="ok">Mafia active: ${ma().length}<br>Citizens active: ${ci().length}</div><div class="actions"><button class="danger" onclick="resetGame()">Start New Game</button></div>`)}function health(){layout('Game Health Check','The current saved game state has been checked.',`<div class="ok">✓ Autosave available</div><div class="ok">✓ Current phase: ${esc(label())}</div><div class="ok">✓ Players assigned: ${S.players.length}</div><div class="ok">✓ Last saved: ${esc(S.lastSaved||'now')}</div><div class="actions"><button class="good" onclick="render()">Return</button></div>`)}function menu(){layout('Menu','The current game remains saved.',`<div class="actions"><button class="good" onclick="render()">Continue Game</button><button class="danger" onclick="resetGame()">Full Reset</button></div>`)}function resetGame(){if(!confirm('Start a new game and permanently remove the current saved game?'))return;if(!confirm('Final confirmation: erase this game?'))return;localStorage.removeItem(SAVE);localStorage.removeItem(OLD);S=fresh();save();render()}load();save();render();</script></body></html>
