<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#4a0f1c"><link rel="manifest" href="manifest.json"><link rel="icon" href="icon.svg"><title>Mafia Game Moderator</title><style>:root{--bg:#070304;--panel:rgba(12,6,8,.88);--line:rgba(212,175,55,.32);--txt:#fff7e6;--mut:#dfcfa3;--gold:#d4af37;--gold2:#f6df8c;--red:#8e1f39;--green:#24c96b}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:linear-gradient(rgba(5,2,4,.56),rgba(5,2,4,.82)),url('background.svg') center/cover fixed no-repeat,#070304}button,input,select,textarea{font:inherit}button{border:1px solid rgba(212,175,55,.35);border-radius:16px;padding:13px 15px;background:linear-gradient(180deg,var(--gold2),var(--gold));color:#1d1102;font-weight:950;box-shadow:0 10px 25px #0008}button.secondary{background:rgba(212,175,55,.13);color:var(--gold2)}button.danger{background:linear-gradient(180deg,#a32945,#6e1028);color:white}button.good{background:linear-gradient(180deg,#39dc7b,#16a34a);color:#031b0b}input,select,textarea{width:100%;border:1px solid #d7c27a;border-radius:14px;padding:12px;background:#fffaf0;color:#16080b}textarea{min-height:120px}label{font-weight:900;color:#f4ddb0;display:block;margin:0 0 6px}.wrap{max-width:1120px;margin:auto;padding:14px}.top{display:flex;justify-content:space-between;gap:10px;margin:8px 0 14px}.brand h1{font-size:clamp(30px,7vw,52px);line-height:1;margin:0}.hint,.small{color:var(--mut);line-height:1.45}.small{font-size:13px}.credit{font-size:11px;opacity:.72;color:#ead99b}.card{background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:16px;margin:14px 0;box-shadow:0 24px 60px #0009;backdrop-filter:blur(8px)}.dash{position:sticky;top:0;z-index:10;background:rgba(5,2,4,.96);border:1px solid var(--line);border-radius:22px;padding:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.dash div{text-align:center;background:rgba(212,175,55,.08);border-radius:14px;padding:9px}.dash b{font-size:24px;display:block}.dash span{font-size:11px;color:var(--mut);font-weight:900}.grid{display:grid;gap:10px}.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.players{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.row{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:17px;padding:12px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}.row.dead{opacity:.45;filter:grayscale(1)}.row.done{border-color:var(--green);background:rgba(34,197,94,.12)}.name{font-weight:950}.pill{display:inline-flex;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:950;background:rgba(212,175,55,.14);border:1px solid var(--line);color:var(--gold2)}.ok{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.35);border-radius:15px;padding:11px;color:#dcfce7}.warn{background:rgba(212,175,55,.12);border:1px solid rgba(212,175,55,.35);border-radius:15px;padding:11px;color:#fff2bf}.err{background:rgba(220,38,38,.14);border:1px solid rgba(220,38,38,.38);border-radius:15px;padding:11px;color:#fecaca}.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:12px}.actions button{flex:1;min-width:140px}.hidden{display:none!important}.log{display:grid;gap:8px;max-height:330px;overflow:auto}.log div{background:rgba(255,255,255,.055);border:1px solid var(--line);border-radius:13px;padding:10px}.modal{position:fixed;inset:0;background:#050204;display:none;align-items:center;justify-content:center;z-index:30;padding:18px}.modal.on{display:flex}.box{width:min(560px,100%);background:linear-gradient(180deg,#2b0e16,#070304);border:1px solid var(--line);border-radius:28px;padding:24px;text-align:center;display:flex;flex-direction:column;gap:16px}.role{font-size:clamp(40px,13vw,70px);font-weight:1000;color:var(--gold2);margin:0}@media(max-width:760px){.top{display:block}.g2,.g3,.players{grid-template-columns:1fr}.dash{grid-template-columns:repeat(2,1fr)}.row{grid-template-columns:1fr}.actions button{min-width:0;width:100%}}</style></head><body><div class="wrap"><div class="top"><div class="brand"><h1>Mafia Game Moderator</h1><p class="hint">Step-by-step handler system with live dashboard and locked stages.</p><span class="credit">by Nima · Rev 12</span></div><div class="actions"><button class="secondary" onclick="goHome()">Home</button><button class="danger" onclick="menu()">Menu</button></div></div><div id="dash" class="dash"></div><main id="app"></main></div><div id="modal" class="modal"><div class="box"><h2 id="modalName"></h2><p class="role" id="modalRole"></p><p id="modalDesc" class="hint"></p><button class="danger" onclick="closeRole()">Hide & Mark Seen</button></div></div><script>const SAVE='nima_mafia_rev12';const R={Godfather:{n:'Godfather',t:'Mafia',d:'Mafia leader. Detective reads as Citizen. Shooting immunity can be on/off.'},Lecter:{n:'Dr. Lecter',t:'Mafia',d:'Mafia-side shield/block role.'},Mafia:{n:'Mafia',t:'Mafia',d:'Regular mafia team member.'},Detective:{n:'Detective',t:'Citizen',d:'Checks one player at night.'},Doctor:{n:'Citizen Doctor',t:'Citizen',d:'Saves one player at night; self-save limit is tracked.'},Vigilante:{n:'Vigilante',t:'Citizen',d:'Can shoot at night; shot limit is tracked.'},Citizen:{n:'Citizen',t:'Citizen',d:'No night power; talks and votes.'}};const $=id=>document.getElementById(id);let active=null;let S={phase:'setup',setupStep:0,day:1,night:1,settings:{start:'',count:8,mafia:2,shots:2,selfSaves:1,gfImmune:true},names:[],players:[],seen:[],talked:[],nightData:{},lastPublic:'Game has not started yet.',logs:[],finished:false};function save(){localStorage.setItem(SAVE,JSON.stringify(S))}function load(){try{let x=localStorage.getItem(SAVE);if(x)S=JSON.parse(x)}catch(e){}}function esc(x){return String(x??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function uid(){return Math.random().toString(36).slice(2,9)}function live(){return S.players.filter(p=>p.alive)}function mafia(){return live().filter(p=>R[p.role].t==='Mafia')}function citizens(){return live().filter(p=>R[p.role].t==='Citizen')}function deadM(){return S.players.filter(p=>!p.alive&&R[p.role].t==='Mafia')}function deadC(){return S.players.filter(p=>!p.alive&&R[p.role].t==='Citizen')}function log(t,x){S.logs.unshift({phase:label(),type:t,text:x,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});save()}function label(){if(S.phase==='day')return 'Day '+S.day;if(S.phase==='night')return 'Night '+S.night;if(S.phase==='reveal')return 'Role reveal';return 'Setup'}function renderDash(){let gf=S.settings.gfImmune?'Yes':'No';$('dash').innerHTML=`<div><span>Phase</span><b>${esc(label())}</b></div><div><span>Mafia</span><b>${mafia().length}/${deadM().length}</b><span>alive/dead</span></div><div><span>Citizens</span><b>${citizens().length}/${deadC().length}</b><span>alive/dead</span></div><div><span>Limits</span><b>${S.nightData.vigUsed||0}/${S.settings.shots}</b><span>Vig · Dr ${S.nightData.selfUsed||0}/${S.settings.selfSaves} · GF ${gf}</span></div>`}function card(title,sub,body){$('app').innerHTML=`<section class="card"><h2>${title}</h2><p class="hint">${sub}</p>${body}</section>${extra()}`;renderDash();save()}function extra(){let logHtml='<section class="card"><h2>Game Log</h2><div class="log">'+(S.logs.length?S.logs.map(l=>`<div><b>${esc(l.phase)} · ${esc(l.type)}</b><br>${esc(l.text)}<div class="small">${esc(l.time)}</div></div>`).join(''):'<div>No log yet.</div>')+'</div></section>';let players=S.players.length?'<section class="card"><h2>Live Players</h2><div class="players">'+S.players.map(p=>`<div class="row ${p.alive?'':'dead'}"><div><div class="name">${esc(p.name)}</div><div class="small">${esc(R[p.role].n)} · ${esc(R[p.role].t)} ${p.alive?'':'· Eliminated'}</div></div><span class="pill">${p.alive?'Alive':'Out'}</span></div>`).join('')+'</div></section>':'';return players+logHtml}function goHome(){S.phase='setup';renderSetup()}function menu(){card('Menu','Use carefully during a live game.',`<div class="actions"><button class="secondary" onclick="renderSetup()">Home / Setup</button><button class="good" onclick="finish('Manual finish')">Finish Game</button><button class="danger" onclick="resetAll()">Full Reset</button></div>`)}function resetAll(){localStorage.removeItem(SAVE);S={phase:'setup',setupStep:0,day:1,night:1,settings:{start:'',count:8,mafia:2,shots:2,selfSaves:1,gfImmune:true},names:[],players:[],seen:[],talked:[],nightData:{},lastPublic:'Game has not started yet.',logs:[],finished:false};renderSetup()}const setupLabels=['Game start time','Number of players','Number of Mafia','Vigilante shots','Doctor self-save limit','Godfather shooting immunity','Enter player names','Shuffle names and assign roles'];function renderSetup(){S.phase='setup';let i=S.setupStep;if(i===0)card(`Setup — Step 1 of 8`,setupLabels[i],`<label>Start time</label><input id="v" type="time" value="${esc(S.settings.start)}"><div class="actions"><button class="good" onclick="S.settings.start=$('v').value||new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});nextSetup()">✓ Confirm start time</button></div>`);else if(i===1)card(`Setup — Step 2 of 8`,setupLabels[i],`<label>Total players</label><input id="v" type="number" min="1" max="40" value="${S.settings.count}"><div class="actions"><button class="good" onclick="S.settings.count=Math.max(1,Math.min(40,+$('v').value||8));nextSetup()">✓ Confirm player count</button></div>`);else if(i===2)card(`Setup — Step 3 of 8`,setupLabels[i],`<label>Mafia count including Godfather</label><input id="v" type="number" min="1" max="12" value="${S.settings.mafia}"><div class="actions"><button class="good" onclick="S.settings.mafia=Math.max(1,Math.min(12,+$('v').value||1));nextSetup()">✓ Confirm Mafia count</button></div>`);else if(i===3)card(`Setup — Step 4 of 8`,setupLabels[i],`<label>Vigilante shots</label><input id="v" type="number" min="0" value="${S.settings.shots}"><div class="actions"><button class="good" onclick="S.settings.shots=Math.max(0,+$('v').value||0);nextSetup()">✓ Confirm shots</button></div>`);else if(i===4)card(`Setup — Step 5 of 8`,setupLabels[i],`<label>Doctor self-saves</label><input id="v" type="number" min="0" value="${S.settings.selfSaves}"><div class="actions"><button class="good" onclick="S.settings.selfSaves=Math.max(0,+$('v').value||0);nextSetup()">✓ Confirm self-save limit</button></div>`);else if(i===5)card(`Setup — Step 6 of 8`,setupLabels[i],`<div class="warn">Should Godfather survive Vigilante shooting?</div><div class="actions"><button class="good" onclick="S.settings.gfImmune=true;nextSetup()">Yes — immune</button><button class="secondary" onclick="S.settings.gfImmune=false;nextSetup()">No — not immune</button></div>`);else if(i===6)card(`Setup — Step 7 of 8`,setupLabels[i],`<label>Names, one per line</label><textarea id="v">${esc(S.names.join('\n'))}</textarea><div class="actions"><button class="good" onclick="setNames()">✓ Confirm names</button></div><div id="err" class="err hidden"></div>`);else card(`Setup — Step 8 of 8`,setupLabels[i],`<div class="ok">Ready to shuffle and assign roles.</div><div class="warn">${esc(rolePreview())}</div><div class="actions"><button class="good" onclick="shuffleRoles()">✓ Shuffle names and assign roles</button></div>`)}function nextSetup(){S.setupStep=Math.min(7,S.setupStep+1);renderSetup()}function setNames(){let n=$('v').value.split(/\n/).map(x=>x.trim()).filter(Boolean);if(n.length!==S.settings.count){$('err').textContent=`You entered ${n.length} names. Required: ${S.settings.count}.`;$('err').classList.remove('hidden');return}S.names=n;nextSetup()}function roleList(){let n=S.settings.count,m=Math.min(S.settings.mafia,n);let arr=[];if(n>=1)arr.push('Godfather');if(n>=3)arr.push('Detective');if(n>=4)arr.push('Doctor');if(n>=5)arr.push('Vigilante');if(n>=7&&m>1)arr.push('Lecter');let mafiaSlots=Math.max(0,m-arr.filter(r=>R[r].t==='Mafia').length);for(let i=0;i<mafiaSlots;i++)arr.push('Mafia');while(arr.length<n)arr.push('Citizen');return arr.slice(0,n)}function rolePreview(){let c={};roleList().forEach(r=>c[R[r].n]=(c[R[r].n]||0)+1);return Object.entries(c).map(([k,v])=>v+' '+k).join(' · ')}function shuffleArr(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function shuffleRoles(){let names=shuffleArr(S.names),roles=shuffleArr(roleList());S.players=names.map((name,i)=>({id:uid(),name,role:roles[i],alive:true}));S.seen=[];S.phase='reveal';S.setupStep=0;log('Setup','Roles shuffled and assigned.');renderReveal()}function renderReveal(){let body='<div class="players">'+S.players.map((p,i)=>`<div class="row ${S.seen.includes(p.id)?'done':''}"><div><div class="name">${esc(p.name)}</div><div class="small">${S.seen.includes(p.id)?'Role seen':'Waiting for private reveal'}</div></div><button onclick="openRole('${p.id}')">${S.seen.includes(p.id)?'Seen':'Show role'}</button></div>`).join('')+'</div><div class="actions"><button class="good" '+(S.seen.length===S.players.length?'':'disabled')+' onclick="startDay1()">Start Day 1</button></div>';card('Private Role Reveal','Show role to every player privately. Each player must be ticked before Day 1 starts.',body)}function openRole(id){active=id;let p=S.players.find(x=>x.id===id);$('modalName').textContent=p.name;$('modalRole').textContent=R[p.role].n;$('modalDesc').textContent=R[p.role].d;$('modal').classList.add('on')}function closeRole(){if(active&&!S.seen.includes(active))S.seen.push(active);$('modal').classList.remove('on');save();renderReveal()}function startDay1(){S.phase='day';S.day=1;S.talked=[];log('Phase','Day 1 started.');renderDay()}function renderDay(){let alive=live();let allTalked=alive.every(p=>S.talked.includes(p.id));let intro=S.day===1?'Day 1 is intro and open conversation. Tick each player after they have had opportunity to talk.':'Announce night result, then tick each living player after they talk.';let talk='<div class="players">'+alive.map(p=>`<div class="row ${S.talked.includes(p.id)?'done':''}"><div><div class="name">${esc(p.name)}</div><div class="small">${S.talked.includes(p.id)?'Had opportunity to talk':'Waiting to talk'}</div></div><button onclick="tickTalk('${p.id}')">${S.talked.includes(p.id)?'✓ Done':'Tick'}</button></div>`).join('')+'</div>';let next=S.day===1?`<button class="good" ${allTalked?'':'disabled'} onclick="startNight()">Move to Night 1</button>`:`<button class="good" ${allTalked?'':'disabled'} onclick="renderVoting()">Move to Voting</button>`;card(`Day ${S.day} — Conversation`,intro,(S.day>1?`<div class="ok"><b>Morning announcement:</b><br>${esc(S.lastPublic)}</div>`:'')+talk+`<div class="actions">${next}</div>`)}function tickTalk(id){if(!S.talked.includes(id))S.talked.push(id);save();renderDay()}function renderVoting(){let alive=live();let list=alive.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');card(`Day ${S.day} — Voting`,'Select nominee and record vote count. App checks majority.',`<label>Nominated player</label><select id="nom"><option value="">No nomination / no execution</option>${list}</select><div class="grid g2"><div><label>Positive votes</label><input id="yes" type="number" min="0" value="0"></div><div><label>Negative votes</label><input id="no" type="number" min="0" value="0"></div></div><div class="actions"><button class="good" onclick="processVote()">Confirm vote result</button><button class="secondary" onclick="noVote()">No execution — move to night</button></div>`)}function processVote(){let id=$('nom').value;if(!id)return noVote();let yes=+$('yes').value||0,voters=live().length,need=Math.floor(voters/2)+1,p=S.players.find(x=>x.id===id);if(yes>=need){p.alive=false;log('Vote',`${p.name} eliminated by vote. Votes: ${yes}/${voters}.`);checkWin()||startNight()}else{log('Vote',`${p.name} survived vote. Votes: ${yes}/${voters}; required ${need}.`);startNight()}}function noVote(){log('Vote','No one eliminated by vote.');startNight()}function startNight(){S.phase='night';S.night=S.day;S.nightData={...S.nightData,mafiaTarget:'',lecterShield:'',detCheck:'',docSave:'',vigTarget:''};log('Phase',`Night ${S.night} started.`);renderNight(0)}function optPlayers(team){let arr=live();if(team==='mafia')arr=mafia();return '<option value="">Select / skip</option>'+arr.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}function renderNight(step){let steps=['Everyone sleeps','Mafia identify each other','Mafia target','Dr. Lecter shield','Special citizen role signals','Detective check','Citizen Doctor save','Vigilante action','Process night result'];let body='';if(step===0)body='<div class="ok">Ask everyone to close eyes.</div><div class="actions"><button class="good" onclick="renderNight(1)">✓ Everyone asleep</button></div>';if(step===1)body='<div class="warn">Mafia team: '+mafia().map(p=>esc(p.name)+' — '+R[p.role].n).join(' · ')+'</div><div class="actions"><button class="good" onclick="renderNight(2)">✓ Mafia confirmed each other</button></div>';if(step===2)body=`<label>Mafia / Godfather target</label><select id="x">${optPlayers()}</select><div class="actions"><button class="good" onclick="S.nightData.mafiaTarget=$('x').value;renderNight(3)">✓ Confirm target</button></div>`;if(step===3){let has=mafia().some(p=>p.role==='Lecter');body=has?`<label>Dr. Lecter shield</label><select id="x">${optPlayers('mafia')}</select><div class="actions"><button class="good" onclick="S.nightData.lecterShield=$('x').value;renderNight(4)">✓ Confirm shield / skip</button></div>`:`<div class="warn">Dr. Lecter not active/alive.</div><div class="actions"><button class="good" onclick="renderNight(4)">✓ Skip</button></div>`}if(step===4)body='<div class="players">'+['Vigilante','Detective','Doctor'].map(r=>{let p=live().find(x=>x.role===r);return `<div class="row ${p?'':'dead'}"><div><div class="name">${R[r].n}</div><div class="small">${p?esc(p.name):'Not active/alive'}</div></div><span class="pill">Signal checked</span></div>`}).join('')+'</div><div class="actions"><button class="good" onclick="renderNight(5)">✓ Role signals checked</button></div>';if(step===5){let has=live().some(p=>p.role==='Detective');body=has?`<label>Detective checks player</label><select id="x">${optPlayers()}</select><div class="actions"><button class="good" onclick="detectiveResult()">✓ Confirm Detective result</button></div><div id="out"></div>`:`<div class="warn">Detective not active/alive.</div><div class="actions"><button class="good" onclick="renderNight(6)">✓ Skip</button></div>`}if(step===6){let has=live().some(p=>p.role==='Doctor');body=has?`<label>Citizen Doctor save</label><select id="x">${optPlayers()}</select><div class="actions"><button class="good" onclick="doctorSave()">✓ Confirm save</button></div><div id="out"></div>`:`<div class="warn">Doctor not active/alive.</div><div class="actions"><button class="good" onclick="renderNight(7)">✓ Skip</button></div>`}if(step===7){let has=live().some(p=>p.role==='Vigilante'),used=S.nightData.vigUsed||0;body=has&&used<S.settings.shots?`<label>Vigilante target or skip</label><select id="x">${optPlayers()}</select><div class="warn">Shots used: ${used}/${S.settings.shots}</div><div class="actions"><button class="good" onclick="S.nightData.vigTarget=$('x').value;if(S.nightData.vigTarget)S.nightData.vigUsed=(S.nightData.vigUsed||0)+1;renderNight(8)">✓ Confirm Vigilante action</button></div>`:`<div class="warn">Vigilante not active/alive or shot limit reached.</div><div class="actions"><button class="good" onclick="renderNight(8)">✓ Skip</button></div>`}if(step===8)body=`<div class="warn">App will calculate result now.</div><div class="actions"><button class="good" onclick="processNight()">Process Night ${S.night}</button></div>`;card(`Night ${S.night} — Step ${step+1} of 9`,steps[step],body)}function detectiveResult(){let id=$('x').value;if(!id){renderNight(6);return}let p=S.players.find(x=>x.id===id),res=p.role==='Godfather'?'Citizen':R[p.role].t;S.nightData.detCheck=id;log('Detective',`Detective checked ${p.name}. Handler signal: ${res==='Mafia'?'LIKE / Mafia':'DISLIKE / Citizen'}.`);$('out').innerHTML=`<div class="ok">Signal to Detective: <b>${res==='Mafia'?'LIKE — Mafia':'DISLIKE — Citizen'}</b></div><div class="actions"><button class="good" onclick="renderNight(6)">Next</button></div>`}function doctorSave(){let id=$('x').value;if(id){let doc=live().find(p=>p.role==='Doctor');if(doc&&id===doc.id){let used=S.nightData.selfUsed||0;if(used>=S.settings.selfSaves){$('out').innerHTML='<div class="err">Doctor self-save limit reached. Select another player.</div>';return}S.nightData.selfUsed=used+1}S.nightData.docSave=id;log('Doctor',`Citizen Doctor saved ${S.players.find(p=>p.id===id).name}.`)}renderNight(7)}function processNight(){let killed=[];let mt=S.nightData.mafiaTarget,ds=S.nightData.docSave,vt=S.nightData.vigTarget,shield=S.nightData.lecterShield;if(mt&&mt!==ds)killed.push({id:mt,by:'Mafia'});if(vt){let p=S.players.find(x=>x.id===vt);if(vt===shield)log('Night result',`${p.name} survived Vigilante due to Dr. Lecter shield.`);else if(p.role==='Godfather'&&S.settings.gfImmune)log('Night result',`${p.name} survived Vigilante due to Godfather immunity.`);else killed.push({id:vt,by:'Vigilante'});}let ids=[...new Set(killed.map(k=>k.id))];ids.forEach(id=>{let p=S.players.find(x=>x.id===id);p.alive=false;log('Elimination',`${p.name} eliminated overnight.`)});if(mt&&mt===ds)log('Night result','Mafia target survived due to Citizen Doctor save.');S.lastPublic=ids.length?ids.map(id=>S.players.find(p=>p.id===id).name).join(', ')+' eliminated overnight.':'No one was eliminated overnight.';if(checkWin())return;S.day=S.night+1;S.phase='day';S.talked=[];renderDay()}function checkWin(){let m=mafia().length,c=citizens().length;if(S.players.length&&m===0){finish('Citizens win');return true}if(m>0&&m>=c){finish('Mafia wins');return true}return false}function finish(w){S.finished=true;S.winner=w;log('Game Completed',w);card('Game Completed',w,`<div class="ok"><h2>${esc(w)}</h2><p>Final count: Mafia ${mafia().length}, Citizens ${citizens().length}</p></div><div class="actions"><button class="secondary" onclick="renderSetup()">Home</button><button class="danger" onclick="resetAll()">Full Reset</button></div>`)}function init(){load();renderDash();if(S.phase==='reveal')renderReveal();else if(S.phase==='day')renderDay();else if(S.phase==='night')renderNight(0);else renderSetup()}init();</script></body></html>
